version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Group all minor/patch updates into a single PR to cut noise
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      # Keep the Astro core + integrations together for coordinated major bumps
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
      keystatic:
        patterns:
          - "@keystatic/*"
    labels:
      - "dependencies"

  # GitHub Actions used in the deploy workflow
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
